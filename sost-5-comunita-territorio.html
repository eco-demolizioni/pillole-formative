<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pillola formativa — Comunità e territorio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     PILLOLA FORMATIVA — TEMPLATE RIUTILIZZABILE
     Per creare una nuova pillola (es. Anticorruzione, Codice
     della Strada) basta duplicare questo file e modificare
     l'oggetto PILLOLA in fondo allo <script>. La grafica e il
     motore restano invariati.
     Colori personalizzabili qui sotto (token CSS).
     ========================================================= */
  :root{
    --ink:#16181A;
    --concrete:#E6E7E3;
    --surface:#FBFBF9;
    --steel:#6A726E;
    --line:#D2D3CD;
    --eco:#245C44;
    --eco-bright:#2E7355;
    --hazard:#F2B705;
    --ok:#1F7A4D;
    --no:#B23A2E;
    --radius:18px;
    --pad:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Barlow",system-ui,sans-serif;
    color:var(--ink);
    background:
      repeating-linear-gradient(135deg, #DBDCD6 0 14px, #E6E7E3 14px 28px);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    min-height:100dvh;
    padding:18px;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- telaio "schermo telefono" ---- */
  .device{
    width:100%;
    max-width:430px;
    height:min(860px, calc(100vh - 36px));
    height:min(860px, calc(100dvh - 36px));
    background:var(--surface);
    border-radius:26px;
    box-shadow:0 24px 60px rgba(22,24,26,.28), 0 2px 0 rgba(255,255,255,.6) inset;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
  }

  /* ---- nastro di avanzamento (firma: hazard tape) ---- */
  .topbar{
    flex:0 0 auto;
    padding:14px 18px 12px;
    border-bottom:1px solid var(--line);
    background:var(--surface);
  }
  .brandrow{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:11px;
  }
  .brand{
    font-family:"Barlow Condensed",sans-serif;
    font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    font-size:12px;color:var(--ink);
  }
  .brand b{color:var(--eco)}
  .stepcount{
    font-family:"Barlow Condensed",sans-serif;
    font-weight:600;letter-spacing:.1em;font-size:12px;color:var(--steel);
  }
  .track{
    height:7px;border-radius:6px;overflow:hidden;
    background:var(--line);position:relative;
  }
  .track .fill{
    position:absolute;inset:0 100% 0 0;
    background:
      repeating-linear-gradient(45deg, var(--hazard) 0 9px, var(--ink) 9px 18px);
    transition:right .45s cubic-bezier(.2,.8,.2,1);
  }

  /* ---- area contenuto ---- */
  .stage{
    flex:1 1 auto;
    overflow-y:auto;
    padding:var(--pad);
    display:flex;flex-direction:column;
  }
  .screen{display:flex;flex-direction:column;flex:1}
  .anim{animation:slide .42s cubic-bezier(.2,.8,.2,1) both}
  @keyframes slide{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .eyebrow{
    font-family:"Barlow Condensed",sans-serif;
    font-weight:700;text-transform:uppercase;letter-spacing:.16em;
    font-size:13px;color:var(--eco);
    display:inline-flex;align-items:center;gap:9px;margin-bottom:14px;
  }
  .eyebrow::before{
    content:"";width:26px;height:10px;border-radius:2px;
    background:repeating-linear-gradient(45deg,var(--hazard) 0 5px,var(--ink) 5px 10px);
  }
  h1{
    font-family:"Barlow Condensed",sans-serif;
    font-weight:700;line-height:.98;letter-spacing:-.01em;text-transform:uppercase;
    font-size:clamp(38px,11vw,48px);margin-bottom:14px;
  }
  h2{
    font-family:"Barlow Condensed",sans-serif;
    font-weight:600;line-height:1.02;text-transform:uppercase;letter-spacing:.005em;
    font-size:clamp(27px,7.5vw,33px);margin-bottom:16px;
  }
  p{font-size:17px;line-height:1.5;color:#23262A;margin-bottom:14px}
  .lead{font-size:18.5px;color:#2B2F33}
  .muted{color:var(--steel)}

  .meta{
    margin-top:auto;display:flex;gap:10px;flex-wrap:wrap;
    padding-top:18px;
  }
  .chip{
    font-family:"Barlow Condensed",sans-serif;
    font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:13px;
    background:#EFEFEB;border:1px solid var(--line);color:var(--ink);
    padding:7px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:7px;
  }
  .chip svg{width:15px;height:15px}

  /* punti chiave */
  ul.points{list-style:none;display:flex;flex-direction:column;gap:13px;margin:6px 0 4px}
  ul.points li{display:flex;gap:13px;align-items:flex-start;font-size:16.5px;line-height:1.42}
  ul.points li .ic{
    flex:0 0 auto;width:30px;height:30px;border-radius:9px;
    background:var(--eco);color:#fff;display:grid;place-items:center;margin-top:1px;
  }
  ul.points li .ic svg{width:17px;height:17px}
  ul.points li b{font-weight:600}

  .callout{
    border-left:4px solid var(--hazard);
    background:#FBF4DD;
    padding:13px 15px;border-radius:0 12px 12px 0;
    font-size:15.5px;line-height:1.45;margin-top:6px;
  }
  .callout strong{display:block;font-family:"Barlow Condensed",sans-serif;
    text-transform:uppercase;letter-spacing:.08em;font-size:13px;margin-bottom:3px;color:#8a6a04}

  /* ---- quiz ---- */
  .qnum{
    font-family:"Barlow Condensed",sans-serif;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;font-size:13px;color:var(--steel);margin-bottom:10px;
  }
  .answers{display:flex;flex-direction:column;gap:11px;margin-top:4px}
  .answer{
    text-align:left;font-family:inherit;font-size:16.5px;line-height:1.35;color:var(--ink);
    background:#fff;border:2px solid var(--line);border-radius:14px;
    padding:15px 16px;cursor:pointer;transition:border-color .15s, background .15s, transform .08s;
    display:flex;align-items:center;gap:13px;width:100%;
  }
  .answer:hover{border-color:var(--steel)}
  .answer:active{transform:scale(.99)}
  .answer .mark{
    flex:0 0 auto;width:24px;height:24px;border-radius:50%;
    border:2px solid var(--line);display:grid;place-items:center;
  }
  .answer .mark svg{width:14px;height:14px;opacity:0;transition:opacity .15s}
  .answer.correct{border-color:var(--ok);background:#EBF6F0}
  .answer.correct .mark{border-color:var(--ok);background:var(--ok)}
  .answer.correct .mark svg{opacity:1;color:#fff}
  .answer.wrong{border-color:var(--no);background:#FBEEEC}
  .answer.wrong .mark{border-color:var(--no);background:var(--no)}
  .answer.wrong .mark svg{opacity:1;color:#fff}
  .answer.locked{cursor:default;pointer-events:none;opacity:.85}
  .answer.locked.correct,.answer.locked.wrong{opacity:1}

  .feedback{
    margin-top:16px;padding:14px 15px;border-radius:12px;font-size:15.5px;line-height:1.45;
    opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s;
  }
  .feedback.show{opacity:1;transform:none}
  .feedback.ok{background:#EBF6F0;border:1px solid #BCE0CD}
  .feedback.no{background:#FBEEEC;border:1px solid #EAC4BE}
  .feedback b{font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:13.5px}

  /* ---- esito ---- */
  .scorewrap{text-align:center;margin:8px 0 4px}
  .scorering{
    width:128px;height:128px;margin:6px auto 16px;border-radius:50%;
    display:grid;place-items:center;
    background:conic-gradient(var(--eco) var(--deg,0deg), var(--line) 0);
    position:relative;
  }
  .scorering::after{content:"";position:absolute;inset:11px;border-radius:50%;background:var(--surface)}
  .scoreval{position:relative;font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:40px;line-height:1}
  .scoreval small{display:block;font-size:13px;letter-spacing:.1em;color:var(--steel);font-weight:600;margin-top:2px}

  .field{margin-top:18px}
  .field label{
    display:block;font-family:"Barlow Condensed",sans-serif;font-weight:600;
    text-transform:uppercase;letter-spacing:.08em;font-size:13px;color:var(--steel);margin-bottom:7px;
  }
  .field input{
    width:100%;font-family:inherit;font-size:17px;padding:13px 14px;
    border:2px solid var(--line);border-radius:13px;background:#fff;color:var(--ink);
  }
  .field input:focus{outline:none;border-color:var(--eco)}
  .registered{
    margin-top:16px;padding:14px 15px;border-radius:12px;background:#EBF6F0;
    border:1px solid #BCE0CD;font-size:15px;line-height:1.45;display:none;
  }
  .registered.show{display:block}

  /* ---- footer / pulsanti ---- */
  .footer{
    flex:0 0 auto;padding:14px 18px calc(16px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);background:var(--surface);
    display:flex;gap:11px;align-items:center;
  }
  .btn{
    font-family:"Barlow Condensed",sans-serif;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;font-size:17px;cursor:pointer;border:none;border-radius:13px;
    padding:15px 18px;transition:transform .08s, background .15s;
  }
  .btn:active{transform:scale(.98)}
  .btn:focus-visible{outline:3px solid var(--hazard);outline-offset:2px}
  .btn-primary{flex:1;background:var(--eco);color:#fff}
  .btn-primary:hover{background:var(--eco-bright)}
  .btn-primary:disabled{background:var(--line);color:var(--steel);cursor:not-allowed}
  .btn-ghost{
    background:transparent;color:var(--steel);border:2px solid var(--line);
    flex:0 0 auto;font-size:15px;padding:13px 16px;
  }
  .btn-ghost:hover{border-color:var(--steel);color:var(--ink)}

  @media (prefers-reduced-motion: reduce){
    .anim,.feedback,.track .fill{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>
  <main class="device" role="application" aria-label="Pillola formativa">
    <header class="topbar">
      <div class="brandrow">
        <span class="brand" id="brand"></span>
        <span class="stepcount" id="stepcount"></span>
      </div>
      <div class="track"><div class="fill" id="fill"></div></div>
    </header>

    <section class="stage" id="stage" aria-live="polite"></section>

    <footer class="footer" id="footer"></footer>
  </main>

<script>
/* ============================================================
   1) CONTENUTO DELLA PILLOLA  — modifica solo questo oggetto
      per creare nuove pillole (Anticorruzione, Codice della
      Strada, ESG, ...). Tutto il resto è il "motore".
   ============================================================ */
const PILLOLA = {
  "brand": "ECO Demolizioni · <b>Formazione</b>",
  "durata": "≈ 2 min",
  "titolo": "Comunità e territorio",
  "occhiello": "Sostenibilità · pillola 5 di 5",
  "sottotitolo": "L'azienda non vive isolata: restituisce valore al territorio in cui opera.",
  "cards": [
    {
      "eyebrow": "Le scuole",
      "h2": "Apriamo le porte ai giovani",
      "body": "ECO Demolizioni collabora con le <b>scuole del territorio</b> tra visite agli impianti, alternanza scuola-lavoro ed eventi come Ecomondo. L'obiettivo è coinvolgere 8 scuole."
    },
    {
      "eyebrow": "Sport e sociale",
      "h2": "Vicini alla comunità",
      "points": [
        {
          "ic": "check",
          "t": "Sponsor della <b>Rimini Marathon</b>"
        },
        {
          "ic": "shield",
          "t": "Progetto <b>Lavor-Io</b> con Crescere Insieme per l'inclusione lavorativa"
        },
        {
          "ic": "leaf",
          "t": "Progetti di <b>rigenerazione urbana</b> e spazi ad uso collettivo"
        }
      ]
    },
    {
      "eyebrow": "Nelle emergenze",
      "h2": "Presenti quando serve",
      "body": "Tra le nostre finalità c'è mettere <b>esperienza, professionalità e mezzi</b> a disposizione delle comunità in caso di disastri e calamità naturali."
    },
    {
      "eyebrow": "Perché conta",
      "h2": "Il territorio è casa nostra",
      "body": "Generare e distribuire valore sul territorio rafforza il legame con le comunità in cui viviamo e lavoriamo: un investimento sul futuro di tutti."
    }
  ],
  "quiz": [
    {
      "q": "Come collabora l'azienda con le scuole del territorio?",
      "opts": [
        "Non collabora",
        "Con visite, alternanza scuola-lavoro ed eventi",
        "Solo con donazioni",
        "Solo online"
      ],
      "answer": 1,
      "why": "Tramite visite agli impianti, percorsi di alternanza scuola-lavoro ed eventi come Ecomondo."
    },
    {
      "q": "Quale evento sportivo sostiene ECO Demolizioni?",
      "opts": [
        "La Rimini Marathon",
        "Il Giro d'Italia",
        "Nessuno",
        "Le Olimpiadi"
      ],
      "answer": 0,
      "why": "L'azienda è sponsor della Rimini Marathon."
    },
    {
      "q": "Cosa mette a disposizione l'azienda in caso di calamità?",
      "opts": [
        "Niente",
        "Esperienza, professionalità e mezzi",
        "Solo denaro",
        "Solo comunicati stampa"
      ],
      "answer": 1,
      "why": "Tra le finalità c'è offrire esperienza e professionalità in caso di disastri e calamità naturali."
    }
  ],
  "formUrl": "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=nKfAklGx30qVCGadGQGBNqO8RbzVt_FGsSDoMb1vS0VUQTVMMDVKWk4wWk5KMTdOWFFaRktMWklLVS4u&r3a397c19bbaf482093480bdb1dfd1a3b=%22S%C3%AC%22&redeb3d75e55d447991fcc64adac34131=XSCOREX"
};

/* ============================================================
   2) MOTORE — di norma non serve toccarlo
   ============================================================ */
const ICONS = {
  alert:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>',
  leaf:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.5 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></svg>',
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>',
  lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
  ban:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m5.6 5.6 12.8 12.8"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  tick:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  cross:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v5h5"/><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/></svg>'
};

const stage = document.getElementById('stage');
const footer = document.getElementById('footer');
const fill = document.getElementById('fill');
const stepcount = document.getElementById('stepcount');
document.getElementById('brand').innerHTML = PILLOLA.brand;

// Sequenza: [cover, ...cards, ...domande, esito]
const seq = ['cover', ...PILLOLA.cards.map((_,i)=>'card:'+i), ...PILLOLA.quiz.map((_,i)=>'quiz:'+i), 'result'];
let pos = 0;
let answers = new Array(PILLOLA.quiz.length).fill(null);

function progress(){
  const pct = pos / (seq.length - 1);
  fill.style.right = (100 - pct*100) + '%';
  stepcount.textContent = (pos+1) + ' / ' + seq.length;
}

function render(){
  const step = seq[pos];
  progress();
  if(step === 'cover') return renderCover();
  if(step.startsWith('card:')) return renderCard(+step.split(':')[1]);
  if(step.startsWith('quiz:')) return renderQuiz(+step.split(':')[1]);
  if(step === 'result') return renderResult();
}

function setStage(html){ stage.innerHTML = '<div class="screen anim">'+html+'</div>'; stage.scrollTop = 0; }

function renderCover(){
  setStage(`
    <span class="eyebrow">${PILLOLA.occhiello}</span>
    <h1>${PILLOLA.titolo}</h1>
    <p class="lead">${PILLOLA.sottotitolo}</p>
    <div class="meta">
      <span class="chip">${ICONS.clock}${PILLOLA.durata}</span>
      <span class="chip">${ICONS.doc}${PILLOLA.quiz.length} domande</span>
    </div>
  `);
  footer.innerHTML = `<button class="btn btn-primary" id="next">Inizia la pillola</button>`;
  document.getElementById('next').onclick = go(+1);
}

function renderCard(i){
  const c = PILLOLA.cards[i];
  let mid = c.body ? `<p>${c.body}</p>` : '';
  if(c.points){
    mid += '<ul class="points">' + c.points.map(p =>
      `<li><span class="ic">${ICONS[p.ic]||ICONS.check}</span><span>${p.t}</span></li>`).join('') + '</ul>';
  }
  if(c.callout){
    mid += `<div class="callout"><strong>${c.callout.t}</strong>${c.callout.b}</div>`;
  }
  setStage(`<span class="eyebrow">${c.eyebrow}</span><h2>${c.h2}</h2>${mid}`);
  footer.innerHTML = `
    <button class="btn btn-ghost" id="prev">Indietro</button>
    <button class="btn btn-primary" id="next">Avanti</button>`;
  document.getElementById('prev').onclick = go(-1);
  document.getElementById('next').onclick = go(+1);
}

function renderQuiz(i){
  const item = PILLOLA.quiz[i];
  const given = answers[i];
  const opts = item.opts.map((o,idx)=>{
    let cls = 'answer';
    if(given !== null){
      cls += ' locked';
      if(idx === item.answer) cls += ' correct';
      else if(idx === given) cls += ' wrong';
    }
    const mark = (given!==null && idx===item.answer) ? ICONS.tick
               : (given!==null && idx===given) ? ICONS.cross : '';
    return `<button class="${cls}" data-i="${idx}"><span class="mark">${mark}</span><span>${o}</span></button>`;
  }).join('');

  const fb = given === null ? '' :
    (given === item.answer
      ? `<div class="feedback ok show"><b>Esatto.</b><br>${item.why}</div>`
      : `<div class="feedback no show"><b>Non proprio.</b><br>${item.why}</div>`);

  setStage(`
    <div class="qnum">Domanda ${i+1} di ${PILLOLA.quiz.length}</div>
    <h2>${item.q}</h2>
    <div class="answers">${opts}</div>
    ${fb}
  `);

  if(given === null){
    stage.querySelectorAll('.answer').forEach(btn=>{
      btn.onclick = ()=>{ answers[i] = +btn.dataset.i; render(); };
    });
    footer.innerHTML = `<button class="btn btn-ghost" id="prev">Indietro</button>
      <button class="btn btn-primary" disabled>Avanti</button>`;
    document.getElementById('prev').onclick = go(-1);
  } else {
    const last = i === PILLOLA.quiz.length - 1;
    footer.innerHTML = `<button class="btn btn-ghost" id="prev">Indietro</button>
      <button class="btn btn-primary" id="next">${last ? 'Vedi esito' : 'Prossima domanda'}</button>`;
    document.getElementById('prev').onclick = go(-1);
    document.getElementById('next').onclick = go(+1);
  }
}

function renderResult(){
  const score = answers.reduce((s,a,i)=> s + (a === PILLOLA.quiz[i].answer ? 1 : 0), 0);
  const tot = PILLOLA.quiz.length;
  const deg = Math.round(score/tot*360);
  const ok = score === tot;
  setStage(`
    <span class="eyebrow">${ok ? 'Pillola completata' : 'Quasi!'}</span>
    <div class="scorewrap">
      <div class="scorering" style="--deg:${deg}deg">
        <span class="scoreval">${score}/${tot}<small>Risposte</small></span>
      </div>
      <h2 style="text-align:center">${ok ? 'Ottimo lavoro' : 'Buon inizio'}</h2>
      <p class="muted" style="text-align:center">Premi qui sotto per registrare il completamento: si aprirà il modulo aziendale già compilato, ti basterà premere <b>Invia</b>.</p>
    </div>
    <div class="registered" id="reg"></div>
  `);
  footer.innerHTML = `<button class="btn btn-ghost" id="restart">Rivedi</button>
    <button class="btn btn-primary" id="register">Registra completamento</button>`;
  document.getElementById('restart').onclick = ()=>{ pos=0; answers=new Array(tot).fill(null); render(); };
  document.getElementById('register').onclick = ()=>{
    const reg = document.getElementById('reg');
    if(PILLOLA.formUrl){
      const url = PILLOLA.formUrl.replace('XSCOREX', encodeURIComponent(score + '/' + tot));
      window.open(url, '_blank');
      reg.innerHTML = `Si è aperto il modulo di registrazione. Premi <b>Invia</b> per confermare il completamento.`;
      reg.classList.add('show');
      document.getElementById('register').textContent = 'Riapri il modulo';
    } else {
      reg.innerHTML = `Completamento pronto per la registrazione.<br>
        <span class="muted">Configura il link del modulo per attivare la registrazione automatica.</span>`;
      reg.classList.add('show');
      document.getElementById('register').textContent = 'Registrato \u2713';
    }
  };
}

function go(d){ return ()=>{ pos = Math.max(0, Math.min(seq.length-1, pos+d)); render(); }; }

render();
</script>
